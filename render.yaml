services:
  - type: web
    name: audit-tools-backend
    env: python
    # NOTE: Keep this minimal; configure secrets (e.g. DATABASE_URL_YEE / DATABASE_URL_PLAYSAFE) in Render's dashboard.
    buildCommand: "python -m pip install -r requirements.txt"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: "/health"

