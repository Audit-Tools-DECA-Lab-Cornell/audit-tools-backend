[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "B",   # bugbear
  "UP",  # pyupgrade
]

[tool.ruff.lint.per-file-ignores]
"app/main.py" = ["B008"]
"app/notifications_router.py" = ["B008"]
"alembic/versions/*.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["-q"]
pythonpath = ["."]


[tool.mypy]
exclude = "^alembic/versions/|^app/yee_router\\.py$|^app/yee_scoring\\.py$"
exclude_gitignore = true

[[tool.mypy.overrides]]
module = [
  "app.yee_router",
  "app.yee_scoring",
]
ignore_errors = true