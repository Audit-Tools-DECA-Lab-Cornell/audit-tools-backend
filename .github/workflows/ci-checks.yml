name: CI Checks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  TEST_DATABASE_URL_YEE: ${{ secrets.TEST_DATABASE_URL_YEE }}
  TEST_DATABASE_URL_PLAYSPACE: ${{ secrets.TEST_DATABASE_URL_PLAYSPACE }}
  AUTH_TOKEN_SECRET_KEY: ${{ secrets.AUTH_TOKEN_SECRET_KEY }}
  AUTH_ACCESS_TOKEN_TTL_DAYS: ${{ secrets.AUTH_ACCESS_TOKEN_TTL_DAYS }}
  AUTH_EMAIL_VERIFY_TTL_HOURS: ${{ secrets.AUTH_EMAIL_VERIFY_TTL_HOURS }}
  RATELIMIT_ENABLED: true

defaults:
  run:
    shell: zsh

jobs:
  ruff-lint:
    name: "🔍 Ruff Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Ruff lint
        run: ruff check . --output-format=github

  ruff-format:
    name: "🎨 Ruff Format"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check formatting
        run: ruff format . --check --diff

  type-check:
    name: "🧠 Mypy Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache mypy incremental cache
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            mypy-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Run mypy
        run: mypy --config-file pyproject.toml . --show-error-codes --pretty

  test:
    name: "🧪 Pytest"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ruff-lint, ruff-format]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run tests with coverage
        run: |
          pytest . \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml \
            -q

      - name: Upload coverage report
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 14

  ci-gate:
    name: "✅ All Checks Passed"
    runs-on: ubuntu-latest
    needs: [ruff-lint, ruff-format, type-check, test]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "ruff-lint   : ${{ needs.ruff-lint.result }}"
          echo "ruff-format : ${{ needs.ruff-format.result }}"
          echo "type-check  : ${{ needs.type-check.result }}"
          echo "test        : ${{ needs.test.result }}"

          if [[ \
            "${{ needs.ruff-lint.result }}"   != "success" || \
            "${{ needs.ruff-format.result }}" != "success" || \
            "${{ needs.type-check.result }}"  != "success" || \
            "${{ needs.test.result }}"        != "success" \
          ]]; then
            exit 1
          fi
